baseURL: 'https://nuecht.github.io/'
languageCode: 'en-us'
title: 'Nuecht'

taxonomies:
  topic: topics

outputs:
  home: [HTML, RSS]
  section: [HTML, RSS]
  taxonomy: [HTML, RSS]
  term: [HTML, RSS]

params:
  description: 'Content in the website is broadly divided into articles and notes.
  Articles are written with other people as target audience. Notes are primarily for my own consumption.
  I am hoping this structure encourages me to write more and eventually there will be something here you find useful. '

markup:
  goldmark:
    extensions:
      extras:
        superscript:
          enable: true
    renderer:
      unsafe: true
  highlight:
    style: 'monokailight'
